services:
  proxy:
    image: nginx:1.27-alpine
    depends_on:
      - web
      - verifier
    ports:
      - "3000:80"
    volumes:
      - ./proxy/nginx.conf:/etc/nginx/nginx.conf:ro

  redis:
    image: redis:7-alpine
    expose:
      - "6379"

  verifier:
    build:
      context: ./services/verifier
    environment:
      VERIFIER_HOST: 0.0.0.0
      VERIFIER_PORT: 8000
      VERIFIER_REDIS_URL: redis://redis:6379/0
      VERIFIER_ALLOWED_ORIGINS: '["http://proxy","http://localhost:3000","http://127.0.0.1:3000"]'
      VERIFIER_FACE_MODEL_PATH: /app/models/face/yolov8n-face-lindevs.onnx
      VERIFIER_ANTISPOOF_MODEL_DIR: /app/models/anti_spoof
      VERIFIER_DEEPFAKE_ENABLED: "true"
      VERIFIER_DEEPFAKE_MODEL_MODE: "auto"
      VERIFIER_DEEPFAKE_MODEL_PATH: /app/models/deepfake/model_int8.onnx
      VERIFIER_DEEPFAKE_ENFORCE_DECISION: "false"
    depends_on:
      - redis
    expose:
      - "8000"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.prod
    depends_on:
      - verifier
    environment:
      NEXT_PUBLIC_VERIFIER_HTTP_URL: ""
      NEXT_PUBLIC_VERIFIER_WS_URL: ""
    expose:
      - "3000"
